<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>白汐ex</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f1115;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
            touch-action: pan-x pan-y; /* 允许触摸滚动，但卡片内会阻止 */
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            perspective: 1000px;
            /* 手机端稍微缩小容器确保边距 */
            padding: 20px;
        }

        .card {
            width: 238px;
            height: 333px;
            border-radius: 14px;
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            z-index: 1; 
            
            transition: transform 0.15s ease-out, z-index 0.2s, box-shadow 0.2s;
            will-change: transform;
            transform-style: preserve-3d;
            /* 手机端优化 */
            touch-action: none; /* 卡片内禁止滚动，让拖拽更跟手 */
        }

        .card:nth-child(1) { background-image: url('images/PTCG.png'); }
        
        /* 手机端适配：小屏幕时适当缩小卡片 */
        @media (max-width: 480px) {
            .card {
                width: 200px;
                height: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card"></div>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        let activeCard = null;      // 当前被按住拖动的卡牌
        let activeTouchId = null;    // 记录当前激活的触摸点ID（用于多点触控时只跟踪第一个）

        // ==================== 鼠标事件（PC端） ====================
        window.addEventListener('mousemove', (e) => {
            if (activeCard) {
                updateCardTransform(activeCard, e);
                return;
            }
            cards.forEach(card => {
                if (card.matches(':hover')) {
                    updateCardTransform(card, e);
                } else {
                    resetCard(card);
                }
            });
        });

        window.addEventListener('mouseup', () => {
            if (activeCard) {
                if (!activeCard.matches(':hover')) {
                    resetCard(activeCard);
                }
                activeCard = null;
            }
        });

        cards.forEach(card => {
            card.addEventListener('mousedown', (e) => {
                activeCard = card;
                updateCardTransform(card, e);
            });
        });

        // ==================== 触摸事件（手机端适配） ====================
        cards.forEach(card => {
            // 触摸开始
            card.addEventListener('touchstart', (e) => {
                e.preventDefault();  // 阻止滚动和页面缩放
                const touch = e.touches[0];
                if (!touch) return;
                
                // 如果已经有激活的卡片，先复位
                if (activeCard && activeCard !== card) {
                    resetCard(activeCard);
                }
                
                activeCard = card;
                activeTouchId = touch.identifier;
                
                // 构造一个兼容的事件对象传给 updateCardTransform
                const fakeEvent = {
                    clientX: touch.clientX,
                    clientY: touch.clientY,
                    buttons: 1  // 模拟左键按下状态
                };
                updateCardTransform(card, fakeEvent);
            });
            
            // 触摸移动
            card.addEventListener('touchmove', (e) => {
                e.preventDefault();  // 阻止页面滚动
                
                if (!activeCard) return;
                
                // 找到当前激活的触摸点
                let activeTouch = null;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === activeTouchId) {
                        activeTouch = e.touches[i];
                        break;
                    }
                }
                
                // 如果没找到激活的触摸点，使用第一个
                if (!activeTouch && e.touches.length > 0) {
                    activeTouch = e.touches[0];
                    activeTouchId = activeTouch.identifier;
                }
                
                if (activeTouch) {
                    const fakeEvent = {
                        clientX: activeTouch.clientX,
                        clientY: activeTouch.clientY,
                        buttons: 1  // 保持按下状态
                    };
                    updateCardTransform(activeCard, fakeEvent);
                }
            });
            
            // 触摸结束
            card.addEventListener('touchend', (e) => {
                e.preventDefault();
                
                if (activeCard) {
                    // 检查手指是否还在卡片区域内（粗略判断，touchend时已经没有触摸点了）
                    // 复位卡片（松开后不保持悬停效果，直接回正）
                    resetCard(activeCard);
                    activeCard = null;
                    activeTouchId = null;
                }
            });
            
            // 触摸取消（例如系统打断）
            card.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                if (activeCard) {
                    resetCard(activeCard);
                    activeCard = null;
                    activeTouchId = null;
                }
            });
        });

        // 全局触摸结束兜底（防止手指在卡片外松开）
        window.addEventListener('touchend', (e) => {
            if (activeCard) {
                resetCard(activeCard);
                activeCard = null;
                activeTouchId = null;
            }
        });

        // ==================== 核心函数 ====================
        function updateCardTransform(card, e) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            let rotateY = (x - centerX) / 10;
            let rotateX = (centerY - y) / 10;
            
            // 限制旋转角度，避免过度倾斜（可选，提升体验）
            rotateY = Math.min(Math.max(rotateY, -15), 15);
            rotateX = Math.min(Math.max(rotateX, -15), 15);
            
            // 判断是否按下：buttons === 1 为鼠标左键按下；触摸时我们手动传了 buttons:1
            const isPressed = e.buttons === 1;
            const scale = isPressed ? 1.5 : 1.5;
            
            card.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            card.style.zIndex = 100;
            card.style.boxShadow = '0 25px 50px rgba(0, 0, 0, 0.7)';
        }

        function resetCard(card) {
            card.style.transform = '';
            card.style.zIndex = '';
            card.style.boxShadow = '';
        }
        
        // 防止PC端拖拽图片导致视觉异常
        window.addEventListener('dragstart', (e) => {
            if (e.target.closest && e.target.closest('.card')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
